[build]
buildCommand = "pnpm --filter @float0/events build && pnpm --filter @float0/shared build && pnpm --filter @float0/engine build"

[deploy]
startCommand = "pnpm --filter @float0/engine start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"

[[deploy.watchPatterns]]
pattern = "apps/engine/**"

[[deploy.watchPatterns]]
pattern = "packages/**"
