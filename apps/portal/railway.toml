[build]
buildCommand = "pnpm --filter @float0/events build && pnpm --filter @float0/shared build && pnpm --filter @float0/ui build && pnpm --filter @float0/portal build"

[deploy]
startCommand = "pnpm --filter @float0/portal start"
healthcheckPath = "/brand-mark-dark.png"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"

[[deploy.watchPatterns]]
pattern = "apps/portal/**"

[[deploy.watchPatterns]]
pattern = "packages/**"
